name: build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: Build
        run: go build -o bridge ./bridge.go
      - name: Vet
        run: go vet ./...
